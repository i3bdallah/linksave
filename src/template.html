<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linksave — Saved Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }

  :root {
    --bg: #f4f6f1;
    --bg-strong: #e6ece4;
    --surface: rgba(255, 255, 255, 0.82);
    --surface-strong: rgba(255, 255, 255, 0.94);
    --surface-muted: rgba(246, 248, 245, 0.92);
    --border: rgba(24, 39, 28, 0.09);
    --border-strong: rgba(24, 39, 28, 0.16);
    --text: #102118;
    --text-soft: #415245;
    --text-muted: #6d7c70;
    --accent: #1c7c54;
    --accent-soft: rgba(28, 124, 84, 0.12);
    --accent-strong: #13583b;
    --gold: #c58d2d;
    --gold-soft: rgba(197, 141, 45, 0.14);
    --shadow: 0 24px 60px rgba(21, 39, 24, 0.08);
    --shadow-sm: 0 10px 30px rgba(21, 39, 24, 0.06);
    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 16px;
    --radius-sm: 12px;
    --max: 1280px;
  }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Manrope', sans-serif;
    color: var(--text);
    background:
      radial-gradient(circle at top left, rgba(28, 124, 84, 0.16), transparent 28%),
      radial-gradient(circle at top right, rgba(197, 141, 45, 0.12), transparent 24%),
      linear-gradient(180deg, #f7faf6 0%, var(--bg) 42%, #eef2ec 100%);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(16, 33, 24, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(16, 33, 24, 0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.35), transparent 72%);
  }

  a { color: inherit; }

  .topbar-wrap {
    position: sticky;
    top: 0;
    z-index: 20;
    padding: 16px 20px 0;
  }

  .topbar {
    max-width: var(--max);
    margin: 0 auto;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(18px) saturate(1.2);
    box-shadow: var(--shadow-sm);
  }

  .brand {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-mark {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .brand-mark em {
    font-style: normal;
    color: var(--accent);
  }

  .brand-copy {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .toolbar-search {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .toolbar-search input {
    width: 100%;
    padding: 13px 18px 13px 44px;
    font-size: 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: rgba(248, 250, 247, 0.9);
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  .toolbar-search input:focus {
    border-color: rgba(28, 124, 84, 0.32);
    background: rgba(255, 255, 255, 0.96);
    box-shadow: 0 0 0 4px rgba(28, 124, 84, 0.10);
  }

  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }

  .pill {
    flex-shrink: 0;
    padding: 9px 14px;
    border-radius: 999px;
    background: var(--surface-muted);
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
  }

  .pill strong { color: var(--accent-strong); }

  .shell {
    max-width: var(--max);
    margin: 0 auto;
    padding: 20px 20px 44px;
  }

  .hero {
    position: relative;
    overflow: hidden;
    margin-top: 18px;
    padding: 34px;
    border-radius: var(--radius-xl);
    border: 1px solid rgba(16, 33, 24, 0.08);
    background:
      radial-gradient(circle at 100% 0%, rgba(197, 141, 45, 0.16), transparent 32%),
      radial-gradient(circle at 0% 100%, rgba(28, 124, 84, 0.18), transparent 30%),
      linear-gradient(135deg, rgba(255,255,255,0.96), rgba(247,250,246,0.84));
    box-shadow: var(--shadow);
  }

  .hero::after {
    content: '';
    position: absolute;
    width: 280px;
    height: 280px;
    right: -110px;
    top: -100px;
    border-radius: 50%;
    background: rgba(28, 124, 84, 0.08);
    filter: blur(8px);
  }

  .hero-inner {
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(16, 33, 24, 0.05);
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .hero h1 {
    margin: 16px 0 10px;
    font-family: 'Fraunces', serif;
    font-size: clamp(2.2rem, 5vw, 3.4rem);
    line-height: 0.95;
    letter-spacing: -0.055em;
  }

  .hero p {
    max-width: 48rem;
    margin: 0;
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.75;
  }

  .content-area {
    margin-top: 22px;
  }

  .results-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  .results-head h2 {
    margin: 0;
    font-size: 16px;
    letter-spacing: -0.03em;
  }

  .results-head p {
    margin: 4px 0 0;
    color: var(--text-muted);
    font-size: 13px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .card {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 280px;
    padding: 20px;
    border-radius: 22px;
    border: 1px solid var(--border);
    background: var(--surface-strong);
    box-shadow: var(--shadow-sm);
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    animation: rise 0.35s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--border-strong);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #3ea06e 55%, rgba(197, 141, 45, 0.65));
    opacity: 0.9;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    border-radius: 16px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, rgba(28, 124, 84, 0.16), rgba(197, 141, 45, 0.14));
    color: var(--accent-strong);
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .meta {
    min-width: 0;
    flex: 1;
  }

  .meta h3 {
    margin: 0;
    font-size: 15px;
    line-height: 1.35;
    letter-spacing: -0.03em;
  }

  .headline {
    margin-top: 4px;
    color: var(--text-muted);
    font-size: 12.5px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
  }

  .time {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(16, 33, 24, 0.05);
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }

  .excerpt {
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-line;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 6;
    overflow: hidden;
    word-break: break-word;
  }

  .card.expanded .excerpt {
    -webkit-line-clamp: initial;
    overflow: visible;
  }

  .expand-btn {
    margin-top: 12px;
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--accent-strong);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .link-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .link-chip {
    display: inline-flex;
    align-items: center;
    max-width: 100%;
    padding: 8px 11px;
    border-radius: 999px;
    background: rgba(16, 33, 24, 0.05);
    border: 1px solid rgba(16, 33, 24, 0.06);
    color: var(--text-soft);
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-footer {
    margin-top: auto;
    padding-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-top: 1px solid rgba(16, 33, 24, 0.08);
  }

  .saved {
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 700;
  }

  .open-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-strong);
    font-size: 12px;
    font-weight: 800;
    text-decoration: none;
    white-space: nowrap;
  }

  .open-link svg {
    width: 12px;
    height: 12px;
    transition: transform 0.18s ease;
  }

  .open-link:hover svg { transform: translateX(2px); }

  .empty {
    padding: 56px 24px;
    border: 1px dashed var(--border-strong);
    border-radius: 22px;
    background: rgba(255,255,255,0.66);
    text-align: center;
    color: var(--text-soft);
    grid-column: 1 / -1;
  }

  .empty strong {
    display: block;
    margin-bottom: 6px;
    color: var(--text);
    font-size: 18px;
  }

  .pagination {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 22px;
  }

  .pagination button,
  .pagination span {
    min-width: 42px;
    padding: 10px 14px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.72);
    color: var(--text-soft);
    font: inherit;
    font-size: 13px;
    font-weight: 700;
  }

  .pagination button {
    cursor: pointer;
    transition: border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  }

  .pagination button:hover:not(:disabled) {
    transform: translateY(-1px);
    border-color: rgba(28, 124, 84, 0.28);
    background: rgba(255,255,255,0.92);
  }

  .pagination button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .pagination button:disabled {
    opacity: 0.45;
    cursor: default;
  }

  .pagination .ellipsis {
    border-style: dashed;
    color: var(--text-muted);
  }

  @media (max-width: 720px) {
    .topbar-wrap,
    .shell {
      padding-left: 14px;
      padding-right: 14px;
    }

    .topbar {
      flex-wrap: wrap;
      border-radius: 18px;
    }

    .hero {
      padding: 22px;
      border-radius: 24px;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 8vw, 2.6rem);
    }

    .grid {
      grid-template-columns: 1fr;
    }

    .results-head {
      flex-direction: column;
      align-items: flex-start;
    }

    .card-footer {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>
  <div class="topbar-wrap">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">link<em>save</em></div>
        <div class="brand-copy">Private archive for your saved LinkedIn posts</div>
      </div>
      <div class="toolbar-search">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" id="search" placeholder="Search by author, keyword, or topic..." autofocus>
      </div>
      <div class="pill" id="stats"></div>
    </div>
  </div>

  <main class="shell">
    <section class="hero" id="hero">
      <div class="hero-inner">
        <div class="eyebrow">Saved Knowledge Base</div>
        <h1>Your LinkedIn bookmarks, archived.</h1>
        <p id="heroCopy"></p>
      </div>
    </section>

    <section class="content-area">
      <div class="results-head">
        <div>
          <h2>Saved posts</h2>
          <p id="resultsCopy"></p>
        </div>
        <div class="pill" id="stats"></div>
      </div>
      <div class="grid" id="grid"></div>
      <div class="pagination" id="pagination"></div>
    </section>
  </main>

<script>
const DATA = "__BOOKMARKS_DATA__";
const PER_PAGE = 12;

let filtered = [...DATA];
let page = 1;

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s)
  .replace(/&/g, '&amp;')
  .replace(/</g, '&lt;')
  .replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;');

function initials(name) {
  return String(name)
    .split(/\s+/)
    .map(word => word[0])
    .filter(Boolean)
    .slice(0, 2)
    .join('')
    .toUpperCase() || '?';
}

function formatCount(value) {
  return new Intl.NumberFormat().format(value);
}

function renderCard(post) {
  const id = 'c' + Math.random().toString(36).slice(2, 8);
  const linksHtml = (post.links || []).map(link => {
    const isUrl = String(link).startsWith('http');
    const display = isUrl ? String(link).replace(/^https?:\/\/(www\.)?/, '').split('/')[0] : String(link);
    return isUrl
      ? `<a class="link-chip" href="${esc(link)}" target="_blank" rel="noopener">${esc(display)}</a>`
      : `<span class="link-chip">${esc(display)}</span>`;
  }).join('');

  return `<article class="card" id="${id}">
    <div class="card-head">
      <div class="avatar">${esc(initials(post.author || 'U'))}</div>
      <div class="meta">
        <h3>${esc(post.author || 'Unknown')}</h3>
        ${post.headline ? `<div class="headline">${esc(post.headline)}</div>` : ''}
      </div>
      ${post.postDate ? `<div class="time">~${esc(post.postDate)}</div>` : post.timestamp ? `<div class="time">${esc(post.timestamp)}</div>` : ''}
    </div>
    <div class="excerpt">${esc(post.postText || '(no text extracted)')}</div>
    <button class="expand-btn" onclick="toggleExpand('${id}', this)">Read more</button>
    ${linksHtml ? `<div class="link-row">${linksHtml}</div>` : ''}
    <div class="card-footer">
      <div class="saved">${post.postDate ? `Posted ~${esc(post.postDate)}` : `Saved ${esc(post.saved || '')}`}</div>
      ${post.url ? `<a class="open-link" href="${esc(post.url)}" target="_blank" rel="noopener">Open post <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg></a>` : ''}
    </div>
  </article>`;
}

function toggleExpand(id, button) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
  button.textContent = card.classList.contains('expanded') ? 'Show less' : 'Read more';
}

function updateStats() {
  const query = $('#search').value.trim();
  $('#stats').innerHTML = query
    ? `<strong>${formatCount(filtered.length)}</strong> of ${formatCount(DATA.length)} posts`
    : `<strong>${formatCount(DATA.length)}</strong> saved posts`;
  $('#heroCopy').textContent = query
    ? `Showing ${formatCount(filtered.length)} of ${formatCount(DATA.length)} posts matching “${query}”.`
    : `${formatCount(DATA.length)} posts saved. Use the search bar above to filter by author, keyword, or topic.`;
  $('#resultsCopy').textContent = query
    ? `Filtered results for “${query}”.`
    : 'Newest saved posts appear first.';
}

function render() {
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const start = (page - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);

  if (pageItems.length === 0) {
    $('#grid').innerHTML = `<div class="empty"><strong>No matching posts</strong>Try a broader keyword, a shorter phrase, or search by author.</div>`;
  } else {
    $('#grid').innerHTML = pageItems.map(renderCard).join('');
  }

  requestAnimationFrame(() => {
    document.querySelectorAll('.card').forEach(card => {
      const body = card.querySelector('.excerpt');
      const button = card.querySelector('.expand-btn');
      if (button && body.scrollHeight <= body.clientHeight + 2) {
        button.style.display = 'none';
      }
    });
  });

  updateStats();
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  if (totalPages <= 1) {
    $('#pagination').innerHTML = '';
    return;
  }

  let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">Prev</button>`;
  const range = [];

  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
      range.push(i);
    } else if (range[range.length - 1] !== '...') {
      range.push('...');
    }
  }

  for (const item of range) {
    if (item === '...') {
      html += `<span class="ellipsis">...</span>`;
    } else {
      html += `<button class="${item === page ? 'active' : ''}" onclick="goPage(${item})">${item}</button>`;
    }
  }

  html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="goPage(${page + 1})">Next</button>`;
  $('#pagination').innerHTML = html;
}

function goPage(nextPage) {
  page = nextPage;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function doSearch(query) {
  query = query.toLowerCase().trim();
  page = 1;

  if (!query) {
    filtered = [...DATA];
  } else {
    const terms = query.split(/\s+/);
    filtered = DATA.filter(post => {
      const blob = [post.author, post.headline, post.postText, ...(post.links || [])]
        .join(' ')
        .toLowerCase();
      return terms.every(term => blob.includes(term));
    });
  }

  render();
}

let debounce;
$('#search').addEventListener('input', event => {
  clearTimeout(debounce);
  debounce = setTimeout(() => doSearch(event.target.value), 180);
});

render();
</script>
</body>
</html>
