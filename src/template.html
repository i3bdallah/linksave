<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>linksave — Your Saved Posts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f7f4ed;
    --warm-white: #fefcf8;
    --sand: #ede8dd;
    --sand-dark: #d9d1c2;
    --ink: #1a1714;
    --ink-soft: #3d3830;
    --ink-muted: #8a8279;
    --ink-faint: #b5afa5;
    --terracotta: #c4573a;
    --terracotta-soft: rgba(196, 87, 58, 0.08);
    --terracotta-mid: rgba(196, 87, 58, 0.15);
    --sage: #5a7a64;
    --sage-soft: rgba(90, 122, 100, 0.1);
    --ocean: #3d6b8e;
    --ocean-soft: rgba(61, 107, 142, 0.08);
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(26, 23, 20, 0.04), 0 1px 2px rgba(26, 23, 20, 0.06);
    --shadow-md: 0 4px 20px rgba(26, 23, 20, 0.06), 0 2px 8px rgba(26, 23, 20, 0.04);
    --shadow-lg: 0 12px 40px rgba(26, 23, 20, 0.1), 0 4px 12px rgba(26, 23, 20, 0.06);
  }

  body {
    font-family: 'Satoshi', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Grain overlay ─────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  }

  /* ── Hero / Header ─────────────────────────────── */
  .hero {
    background: var(--warm-white);
    border-bottom: 1px solid var(--sand);
    padding: 48px 32px 40px;
    position: relative;
    overflow: hidden;
  }

  .hero::after {
    content: '';
    position: absolute;
    top: -60%;
    right: -10%;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--terracotta-soft) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-inner {
    max-width: 1100px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 6px;
  }

  .brand-mark {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 38px;
    font-weight: 400;
    letter-spacing: -1px;
    color: var(--ink);
    line-height: 1;
  }

  .brand-mark em {
    color: var(--terracotta);
    font-style: italic;
  }

  .brand-tag {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-muted);
    padding-left: 4px;
  }

  .hero-subtitle {
    font-size: 15px;
    color: var(--ink-muted);
    margin-bottom: 28px;
    max-width: 400px;
  }

  /* ── Search ────────────────────────────────────── */
  .search-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 260px;
    max-width: 520px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    background: var(--cream);
    border: 1.5px solid var(--sand-dark);
    border-radius: 60px;
    color: var(--ink);
    font-family: 'Satoshi', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.25s ease;
  }

  .search-wrap input:focus {
    border-color: var(--terracotta);
    background: var(--warm-white);
    box-shadow: 0 0 0 4px var(--terracotta-soft), var(--shadow-md);
  }

  .search-wrap input::placeholder { color: var(--ink-faint); }

  .search-wrap .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    transition: color 0.2s;
  }

  .search-wrap input:focus ~ .search-icon { color: var(--terracotta); }

  .stats-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--cream);
    border: 1px solid var(--sand);
    border-radius: 60px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-muted);
    white-space: nowrap;
  }

  .stats-pill strong {
    color: var(--terracotta);
    font-variant-numeric: tabular-nums;
  }

  /* ── Sticky search bar ─────────────────────────── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(247, 244, 237, 0.8);
    backdrop-filter: blur(16px) saturate(1.2);
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    border-bottom: 1px solid var(--sand);
    padding: 12px 32px;
    transform: translateY(-100%);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
  }

  .sticky-bar.visible {
    transform: translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  .sticky-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .sticky-brand {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 22px;
    color: var(--ink);
    white-space: nowrap;
  }

  .sticky-brand em { color: var(--terracotta); font-style: italic; }

  .sticky-search {
    flex: 1;
    max-width: 400px;
    position: relative;
  }

  .sticky-search input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--warm-white);
    border: 1.5px solid var(--sand-dark);
    border-radius: 60px;
    color: var(--ink);
    font-family: 'Satoshi', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.2s;
  }

  .sticky-search input:focus {
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px var(--terracotta-soft);
  }

  .sticky-search input::placeholder { color: var(--ink-faint); }

  .sticky-search .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
  }

  .sticky-stats {
    font-size: 13px;
    color: var(--ink-muted);
    white-space: nowrap;
  }

  .sticky-stats strong { color: var(--terracotta); }

  /* ── Main content ──────────────────────────────── */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 32px 48px;
  }

  /* ── Grid ──────────────────────────────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* ── Card ──────────────────────────────────────── */
  .card {
    background: var(--warm-white);
    border: 1px solid var(--sand);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: var(--shadow-sm);
    opacity: 0;
    transform: translateY(12px);
    animation: cardIn 0.4s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0s; }
  .card:nth-child(2) { animation-delay: 0.04s; }
  .card:nth-child(3) { animation-delay: 0.08s; }
  .card:nth-child(4) { animation-delay: 0.12s; }
  .card:nth-child(5) { animation-delay: 0.16s; }
  .card:nth-child(6) { animation-delay: 0.2s; }
  .card:nth-child(7) { animation-delay: 0.24s; }
  .card:nth-child(8) { animation-delay: 0.28s; }
  .card:nth-child(9) { animation-delay: 0.32s; }
  .card:nth-child(10) { animation-delay: 0.36s; }
  .card:nth-child(11) { animation-delay: 0.4s; }
  .card:nth-child(12) { animation-delay: 0.44s; }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
    border-color: var(--sand-dark);
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--terracotta-soft), var(--sage-soft));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.5px;
    color: var(--terracotta);
    flex-shrink: 0;
    border: 1px solid var(--sand);
  }

  .card:nth-child(3n+2) .avatar {
    background: linear-gradient(135deg, var(--ocean-soft), var(--sage-soft));
    color: var(--ocean);
  }

  .card:nth-child(3n+3) .avatar {
    background: linear-gradient(135deg, var(--sage-soft), var(--terracotta-soft));
    color: var(--sage);
  }

  .card-meta { flex: 1; min-width: 0; }

  .author-name {
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  .author-headline {
    font-size: 12.5px;
    color: var(--ink-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .time-badge {
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-faint);
    background: var(--cream);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }

  .card-body {
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--ink-soft);
    white-space: pre-line;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 6;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }

  .card.expanded .card-body {
    -webkit-line-clamp: unset;
  }

  .expand-btn {
    background: none;
    border: none;
    color: var(--terracotta);
    font-family: 'Satoshi', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    padding: 0;
    align-self: flex-start;
    transition: opacity 0.15s;
  }

  .expand-btn:hover { opacity: 0.7; }

  .card-links {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .card-links a {
    font-size: 12px;
    font-weight: 500;
    color: var(--ocean);
    background: var(--ocean-soft);
    padding: 4px 12px;
    border-radius: 20px;
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .card-links a:hover {
    background: rgba(61, 107, 142, 0.14);
    border-color: rgba(61, 107, 142, 0.2);
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 12px;
    border-top: 1px solid var(--sand);
    margin-top: auto;
  }

  .saved-date {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }

  .open-link {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--terracotta);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 14px;
    border-radius: 20px;
    background: var(--terracotta-soft);
    transition: all 0.2s;
    border: 1px solid transparent;
  }

  .open-link:hover {
    background: var(--terracotta-mid);
    border-color: rgba(196, 87, 58, 0.2);
  }

  .open-link svg {
    width: 12px;
    height: 12px;
    transition: transform 0.2s;
  }

  .open-link:hover svg { transform: translateX(2px); }

  /* ── Pagination ────────────────────────────────── */
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 40px;
    padding-bottom: 40px;
  }

  .pagination button {
    padding: 10px 18px;
    border: 1.5px solid var(--sand);
    border-radius: 10px;
    background: var(--warm-white);
    color: var(--ink-soft);
    font-family: 'Satoshi', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pagination button:hover:not(:disabled) {
    border-color: var(--terracotta);
    color: var(--terracotta);
    background: var(--terracotta-soft);
  }

  .pagination button:disabled {
    opacity: 0.35;
    cursor: default;
  }

  .pagination button.active {
    background: var(--terracotta);
    border-color: var(--terracotta);
    color: #fff;
    box-shadow: 0 2px 8px rgba(196, 87, 58, 0.25);
  }

  .pagination .ellipsis {
    font-size: 14px;
    color: var(--ink-faint);
    padding: 0 4px;
    user-select: none;
  }

  /* ── Empty state ───────────────────────────────── */
  .empty {
    text-align: center;
    padding: 80px 20px;
    grid-column: 1 / -1;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    background: var(--sand);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .empty h2 {
    font-family: 'Instrument Serif', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .empty p {
    font-size: 14px;
    color: var(--ink-muted);
  }

  /* ── Responsive ────────────────────────────────── */
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; gap: 14px; }
    .hero { padding: 32px 20px 28px; }
    .container { padding: 20px 16px; }
    .brand-mark { font-size: 30px; }
    .sticky-bar { padding: 10px 16px; }
    .card { padding: 18px; }
  }

  /* ── Scrollbar ─────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--sand-dark); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>
<body>

<!-- Sticky compact bar (appears on scroll) -->
<div class="sticky-bar" id="stickyBar">
  <div class="sticky-inner">
    <div class="sticky-brand">link<em>save</em></div>
    <div class="sticky-search">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="stickySearchInput" placeholder="Search...">
    </div>
    <div class="sticky-stats" id="stickyStats"></div>
  </div>
</div>

<!-- Hero header -->
<div class="hero" id="hero">
  <div class="hero-inner">
    <div class="brand">
      <div class="brand-mark">link<em>save</em></div>
      <span class="brand-tag">saved posts</span>
    </div>
    <p class="hero-subtitle">Your curated collection of LinkedIn bookmarks, beautifully organized.</p>
    <div class="search-row">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search by author, keyword, topic..." autofocus>
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="stats-pill" id="stats"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const DATA = "__BOOKMARKS_DATA__";
const PER_PAGE = 12;

let filtered = [...DATA];
let page = 1;

const $ = (s) => document.querySelector(s);
const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function initials(name) {
  return name.split(/\s+/).map(w => w[0]).filter(Boolean).slice(0, 2).join('').toUpperCase() || '?';
}

function renderCard(p, idx) {
  const id = 'c' + Math.random().toString(36).slice(2, 8);
  const linksHtml = (p.links || [])
    .map(l => {
      const isUrl = l.startsWith('http');
      const display = isUrl ? l.replace(/^https?:\/\/(www\.)?/, '').split('/')[0] : l;
      return isUrl
        ? `<a href="${esc(l)}" target="_blank" rel="noopener">${esc(display)}</a>`
        : `<a href="#" onclick="return false">${esc(l)}</a>`;
    }).join('');

  return `<div class="card" id="${id}">
    <div class="card-header">
      <div class="avatar">${initials(p.author || 'U')}</div>
      <div class="card-meta">
        <div class="author-name">${esc(p.author || 'Unknown')}</div>
        ${p.headline ? `<div class="author-headline" title="${esc(p.headline)}">${esc(p.headline)}</div>` : ''}
      </div>
      ${p.timestamp ? `<span class="time-badge">${esc(p.timestamp)}</span>` : ''}
    </div>
    <div class="card-body">${esc(p.postText || '(no text)')}</div>
    <button class="expand-btn" onclick="toggleExpand('${id}', this)">Read more</button>
    ${linksHtml ? `<div class="card-links">${linksHtml}</div>` : ''}
    <div class="card-footer">
      <span class="saved-date">Saved ${esc(p.saved || '')}</span>
      ${p.url ? `<a class="open-link" href="${esc(p.url)}" target="_blank" rel="noopener">View post <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>` : ''}
    </div>
  </div>`;
}

function toggleExpand(id, btn) {
  const card = document.getElementById(id);
  card.classList.toggle('expanded');
  btn.textContent = card.classList.contains('expanded') ? 'Show less' : 'Read more';
}

function updateStats() {
  const q = $('#search').value.trim();
  const html = q
    ? `<strong>${filtered.length}</strong> of ${DATA.length} posts`
    : `<strong>${DATA.length}</strong> saved posts`;
  $('#stats').innerHTML = html;
  $('#stickyStats').innerHTML = html;
}

function render() {
  const start = (page - 1) * PER_PAGE;
  const pageItems = filtered.slice(start, start + PER_PAGE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));

  if (pageItems.length === 0) {
    $('#grid').innerHTML = `<div class="empty">
      <div class="empty-icon">&#128270;</div>
      <h2>Nothing here</h2>
      <p>No posts match your search. Try different keywords.</p>
    </div>`;
  } else {
    $('#grid').innerHTML = pageItems.map((p, i) => renderCard(p, i)).join('');
  }

  // Hide expand buttons for short posts (after paint)
  requestAnimationFrame(() => {
    document.querySelectorAll('.card').forEach(card => {
      const body = card.querySelector('.card-body');
      const btn = card.querySelector('.expand-btn');
      if (btn && body.scrollHeight <= body.clientHeight + 2) {
        btn.style.display = 'none';
      }
    });
  });

  updateStats();
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  if (totalPages <= 1) { $('#pagination').innerHTML = ''; return; }

  let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="goPage(${page - 1})">&#8592; Prev</button>`;

  const range = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
      range.push(i);
    } else if (range[range.length - 1] !== '...') {
      range.push('...');
    }
  }

  for (const r of range) {
    if (r === '...') {
      html += `<span class="ellipsis">&middot;&middot;&middot;</span>`;
    } else {
      html += `<button class="${r === page ? 'active' : ''}" onclick="goPage(${r})">${r}</button>`;
    }
  }

  html += `<button ${page >= totalPages ? 'disabled' : ''} onclick="goPage(${page + 1})">Next &#8594;</button>`;
  $('#pagination').innerHTML = html;
}

function goPage(p) {
  page = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  page = 1;
  if (!q) {
    filtered = [...DATA];
  } else {
    const terms = q.split(/\s+/);
    filtered = DATA.filter(p => {
      const blob = [p.author, p.headline, p.postText, ...(p.links || [])].join(' ').toLowerCase();
      return terms.every(t => blob.includes(t));
    });
  }
  render();
}

// Sync both search inputs
let debounce;
function handleSearch(value, source) {
  if (source === 'hero') $('#stickySearchInput').value = value;
  else $('#search').value = value;
  clearTimeout(debounce);
  debounce = setTimeout(() => doSearch(value), 180);
}

$('#search').addEventListener('input', e => handleSearch(e.target.value, 'hero'));
$('#stickySearchInput').addEventListener('input', e => handleSearch(e.target.value, 'sticky'));

// Sticky bar visibility
const hero = $('#hero');
const stickyBar = $('#stickyBar');

const observer = new IntersectionObserver(([entry]) => {
  stickyBar.classList.toggle('visible', !entry.isIntersecting);
}, { threshold: 0, rootMargin: '-60px 0px 0px 0px' });

observer.observe(hero);

render();
</script>
</body>
</html>
